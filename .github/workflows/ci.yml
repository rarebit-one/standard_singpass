name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    uses: rarebit-one/.github/.github/workflows/reusable-gem-ci.yml@v1
    with:
      ruby-versions: '["4.0.1","4.0.2","4.0.3","4.0.4"]'
      lint-command: bin/rubocop -f github
