name: Typecheck

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  sorbet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "4.0.4"
          bundler-cache: true
      - name: Run srb tc
        run: bundle exec srb tc
