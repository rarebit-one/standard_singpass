name: Typecheck

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  sorbet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: "4.0.4"
          bundler-cache: true
      - name: Run srb tc
        run: bundle exec srb tc
