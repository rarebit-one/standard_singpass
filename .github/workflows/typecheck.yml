name: Typecheck

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  sorbet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.4"
          bundler-cache: true
      - name: Run srb tc
        run: bundle exec srb tc
