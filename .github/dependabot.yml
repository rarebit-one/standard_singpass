version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    # Paused 2026-05-25: Dependabot's bundler updater supports Ruby <= 3.4.8, but
    # this gem requires Ruby >= 4.0, so bundler version updates fail with
    # tool_version_not_supported. Restore to 10 once Dependabot supports Ruby 4.0.
    open-pull-requests-limit: 0
    groups:
      # The sorbet ecosystem version-locks (sorbet, sorbet-runtime,
      # sorbet-static, tapioca all bump together on each release).
      # sorbet-runtime is a production dep while sorbet/tapioca are
      # development deps, so without this group a single sorbet release
      # produces two overlapping PRs that each burn a full CI run.
      # This group must come first so it wins over the dependency-type
      # groups below (Dependabot assigns each gem to the first match).
      sorbet:
        patterns:
          - "sorbet*"
          - "tapioca"
      development-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
